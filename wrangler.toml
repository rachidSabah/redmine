# Cloudflare Pages Configuration
name = "synchro"
compatibility_date = "2024-01-01"

# CRITICAL: Enable Node.js compatibility for Prisma + libsql
compatibility_flags = ["nodejs_compat"]

# Output directory from @cloudflare/next-on-pages
pages_build_output_dir = ".vercel/output/static"

# Production environment
[env.production]
name = "synchro"

# Preview environment (for PRs)
[env.preview]
name = "synchro-preview"

# Build configuration - DO NOT include wrangler deploy here
[build]
command = "bun run build && npx @cloudflare/next-on-pages"
watch_dir = "src"
