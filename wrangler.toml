# Cloudflare Pages Configuration
# This file configures your Cloudflare Pages deployment

name = "synchro"
compatibility_date = "2024-01-01"

# CRITICAL: Enable Node.js compatibility for Prisma + libsql
compatibility_flags = ["nodejs_compat"]

# Output directory from @cloudflare/next-on-pages
pages_build_output_dir = ".vercel/output/static"

# Production environment
[env.production]
name = "synchro"

# Production environment variables (set in Cloudflare Dashboard)
# [env.production.vars]
# DATABASE_URL = "libsql://your-db.turso.io"
# TURSO_AUTH_TOKEN = "your-token"

# Preview environment (for PRs)
[env.preview]
name = "synchro-preview"

# Build configuration
[build]
command = "bun run build && npx @cloudflare/next-on-pages"
watch_dir = "src"

# Node.js compatibility settings
[node_compat]
compat_flags = ["nodejs_compat"]
