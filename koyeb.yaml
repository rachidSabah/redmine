name: synchro
services:
  - name: web
    instance_type: free
    ports:
      - port: 3000
        protocol: http
    routes:
      - path: /
        port: 3000
    regions:
      - fra
    scalings:
      - min: 1
        max: 1
    health_checks:
      - port: 3000
        protocol: http
        path: /
