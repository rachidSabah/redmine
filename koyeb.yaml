name: synchro
services:
  - name: synchro-web
    instance_type: free
    ports:
      - port: 3000
        protocol: http
    routes:
      - path: /
        port: 3000
    scalings:
      - min: 1
        max: 1
    env:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: libsql://redmine-rachidelsabah.aws-eu-west-1.turso.io
    regions:
      - fra
